services:
  php-box:
    build: .
    container_name: php-box
    ports:
      - "5080:5080"   # 用户 PHP 站点
      - "5090:5090"   # 管理后台
    environment:
      - TZ=Asia/Shanghai
      - ADMIN_USER=admin
      - ADMIN_PASS=admin
      - PHP_DEFAULT=php84
    volumes:
      - ./repo:/var/www/repo
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/php-box-hc"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
