# php-box Nginx Configuration
#
# Port 5080 → User PHP files (/var/www/repo)
# Port 5090 → Admin UI (/var/www/html)

# =========================================================
# :5080 — 用户 PHP 站点
# =========================================================
server {
    listen 5080;
    client_max_body_size 0;
    server_name _;
    root /var/www/repo;
    index index.php index.html;

    location ~ /\.(ht|git|env|svn) {
        deny all;
    }


    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok";
    }

    location ~* \.(jpg|jpeg|png|gif|webp|ico|css|js|svg|woff|woff2|ttf|eot|mp4|webm|ogg|mp3|m3u8|ts)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass unix:/run/php-box/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO        $fastcgi_path_info;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }
}

# =========================================================
# :5090 — 管理后台 (Basic Auth)
# =========================================================
server {
    listen 5090;
    client_max_body_size 0;
    server_name _;
    root /var/www/html;
    index index.php index.html;

    location ~* \.(css|js|svg|woff|woff2|ttf|eot|png|jpg|gif|ico)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php-box/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO        $fastcgi_path_info;
        include fastcgi_params;
        fastcgi_read_timeout 60;
    }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }
}