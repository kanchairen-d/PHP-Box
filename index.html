<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PHP-Box</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top" id="topBar">
  <div class="top-logo">PHP-Box</div>
  <nav class="top-nav" id="nav">
    <a class="on" data-tab="dash">🖥️ 仪表盘</a>
    <a data-tab="files">📁 文件管理</a>
    <a data-tab="logs">📋 日志</a>
  </nav>
  <div class="top-right">
    <span class="ver-badge" id="navVer">PHP 8.4</span>
    <label class="tswitch" title="切换主题">
      <input type="checkbox" id="themeSwitch">
      <span class="ts-track">🌙☀️</span>
    </label>
    <button class="btn btn-sm" id="settingsBtn" title="修改密码" style="padding:4px 8px;font-size:14px">⚙️</button>
    <button class="btn btn-sm" id="logoutBtn" title="退出登录" style="padding:4px 10px;font-size:12px">🚪 退出</button>
  </div>
</div>

<!-- 登录弹窗 -->
<div id="loginOverlay">
  <div class="login-box">
    <div class="login-icon"><svg viewBox="0 0 48 48" width="28" height="28" fill="#fff"><circle cx="24" cy="24" r="20"/><g transform="scale(.55) translate(17, 17)"><path d="M7.5 4h-3a.5.5 0 0 0-.5.5V16a.5.5 0 0 0 .5.5h2a.5.5 0 0 0 .5-.5v-3.5h1.5c3 0 5-1.5 5-4.5v-1c0-2.5-1.5-3-3.5-3zm-.5 5.5H8V7h1.5c.5 0 1 .5 1 1v1c0 .5-.5 1-1 1H7zm11-1.5h-1.5l-.5-2a.5.5 0 0 0-.5-.5h-2a.5.5 0 0 0-.5.5V16a.5.5 0 0 0 .5.5h2a.5.5 0 0 0 .5-.5v-2.5h1l1 2.5a.5.5 0 0 0 .5.5h1.5a.5.5 0 0 0 .5-.5l-.5-1.5v0c.5-.5 1-1.5 1-3v-.5c0-2-.5-3.5-2.5-3.5zm-.5 3.5h-1.5V9h1.5c.5 0 1 .5 1 1v.5c0 .5-.5 1-1 1z"/></g></svg></div>
    <div class="login-title">PHP-Box</div>
    <div class="login-desc">管理后台</div>
    <div class="login-field">
      <input id="loginUser" class="f-input" placeholder="用户名" autocomplete="username" autocapitalize="off" spellcheck="false">
    </div>
    <div class="login-field">
      <input id="loginPass" type="password" class="f-input" placeholder="密码" autocomplete="current-password" spellcheck="false">
    </div>
    <div id="loginErr" class="login-err"></div>
    <button id="loginBtn" class="login-btn">登 录</button>
    <div style="display:flex;align-items:center;gap:14px;margin-top: 6px">
      <div class="login-ft-item" id="loginMpWrap">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="#07c160"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178A1.17 1.17 0 0 1 4.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178 1.17 1.17 0 0 1-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.666 4.229 6.884 4.229.826 0 1.622-.12 2.361-.336a.722.722 0 0 1 .598.082l1.584.926a.272.272 0 0 0 .14.045c.134 0 .24-.11.24-.245 0-.06-.024-.12-.04-.178l-.325-1.233a.492.492 0 0 1 .177-.554C23.025 18.48 24 16.82 24 14.98c0-3.21-2.931-5.837-7.062-6.122zm-2.18 2.677c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.97-.982zm4.844 0c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.97-.982z"/></svg>
        <span style="font-size:11px;color:var(--text-dim)">公众号</span>
        <div class="login-mp-popup"><img src="qr.png" alt="公众号二维码"></div>
      </div>
      <a class="login-ft-item" href="https://github.com/kanchairen-d/PHP-Box" target="_blank" rel="noopener" style="text-decoration:none">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="var(--text-dim)"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.07 1.87 3.75 3.65 3.95-.29.25-.54.73-.54 1.48 0 1.07.01 1.93.01 2.2 0 .21-.15.46-.55.38A8.013 8.013 0 0 1 0 8c0-4.42 3.58-8 8-8z"/></svg>
        <span style="font-size:11px;color:var(--text-dim)">GitHub</span>
      </a>
    </div>
  </div>
</div>

<div class="main-card" id="mainCard">

  <!-- 仪表盘 -->
  <section class="page on" id="pg-dash">
    <h2 class="pg-title">🖥️ 仪表盘</h2>
    <div class="status-bar">
      <span class="ver-pill" id="dVer">-</span>
      <span class="state-pill" id="dState"><span class="dot" id="dDot"></span><span id="dStateTxt">-</span></span>
      <span class="uptime">⏱ <strong id="dUptime">-</strong></span>
      <div class="sw-area">
        <span class="sw-label">🔄 版本</span>
        <select id="dVerSelect">
          <option value="php74">PHP 7.4</option>
          <option value="php84">PHP 8.4</option>
        </select>
        <span id="dVerInfo"></span>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="load-bar-wrap"><span class="load-bar" id="dLoadBar"></span></div><span class="stat-num" id="dLoadPct">-</span><span class="stat-lbl">CPU 负载</span></div>
      <div class="stat"><span class="stat-num" id="dMem">-</span><span class="stat-lbl">内存</span></div>
      <div class="stat"><span class="stat-num" id="dDisk">-</span><span class="stat-lbl">存储</span></div>
      <div class="stat"><span class="stat-num" id="dPHPCnt">0</span><span class="stat-lbl">PHP 模块</span></div>
    </div>
    <div class="row">
      <div class="card">
        <div class="card-h">运行进程</div>
        <div id="dProcs">加载中…</div>
      </div>
      <div class="card">
        <div class="card-h">PHP 版本</div>
        <div id="dPHPVer" style="font-size:13px;font-weight:500">-</div>
        <div class="card-h" style="margin-top:12px">全部模块 <span class="tag" id="dPHPCnt2">0</span></div>
        <div class="mods" id="dPHPMods"></div>
      </div>
    </div>
  </section>

  <!-- 文件管理 -->
  <section class="page" id="pg-files">
    <h2 class="pg-title">📁 文件管理</h2>
    <div class="toolbar">
      <div class="bc" id="fBc"></div>
      <div class="acts">
        <button class="btn" data-act="upload">📤 上传</button>
        <button class="btn" data-act="new">📄 新建</button>
        <button class="btn" data-act="rename">✏️ 重命名</button>
        <button class="btn" data-act="move">📂 移动</button>
        <button class="btn" data-act="bulkmove">📂 批量移动</button>
        <button class="btn" data-act="archive">📦 压缩</button>
        <button class="btn" data-act="extractup">📦 解压</button>
        <button class="btn" data-act="filedel">🗑 删除</button>
        <input type="file" id="fuIn" style="display:none" multiple>
      </div>
    </div>
    <div class="batch-bar" id="fBatch" style="display:none"></div>
    <table class="ft">
      <thead><tr><th class="col-cb"><input type="checkbox" id="fChkAll"></th><th class="col-ico"></th><th>名称</th><th class="col-sz">大小</th><th class="col-dt">修改时间</th><th class="col-act">操作</th></tr></thead>
      <tbody id="fTb"></tbody>
    </table>
    <div class="loading" id="fLo"><div class="spin"></div></div>
    <div class="empty" id="fEm" style="display:none">📂 此目录为空</div>
    <!-- 上传任务面板 -->
    <div id="uploadPanel" style="display:none;background:var(--glass-nav);border:1px solid var(--glass-nav-bd);border-radius:var(--radius-sm);margin-top:12px;padding:14px">
      <div style="font-weight:600;margin-bottom:10px;font-size:14px">📤 上传任务</div>
      <div id="uploadTasks" style="display:flex;flex-direction:column;gap:8px"></div>
    </div>
  </section>

  <!-- PHP 信息 (完整版) -->
  <section class="page" id="pg-phpinfo">
    <h2 class="pg-title">⚙️ PHP 信息</h2>
    <div class="card">
      <div class="card-h">版本 <span class="tag" id="piVer">-</span></div>
      <div id="piMeta">加载中…</div>
    </div>
    <div class="card">
      <div class="card-h">已加载模块 <span class="tag" id="piCnt">0</span></div>
      <div class="mods" id="piMods"></div>
    </div>
  </section>

  <!-- 页脚：公众号 + GitHub -->
  <div class="dash-ft">
    <div class="dash-ft-item" id="mpWrap">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="#07c160"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178A1.17 1.17 0 0 1 4.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178 1.17 1.17 0 0 1-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.666 4.229 6.884 4.229.826 0 1.622-.12 2.361-.336a.722.722 0 0 1 .598.082l1.584.926a.272.272 0 0 0 .14.045c.134 0 .24-.11.24-.245 0-.06-.024-.12-.04-.178l-.325-1.233a.492.492 0 0 1 .177-.554C23.025 18.48 24 16.82 24 14.98c0-3.21-2.931-5.837-7.062-6.122zm-2.18 2.677c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.97-.982zm4.844 0c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.97-.982z"/></svg>
      <span class="mp-label">公众号</span>
      <div class="mp-popup"><img src="qr.png" alt="公众号二维码"></div>
    </div>
    <a class="dash-ft-item" href="https://github.com/kanchairen-d/PHP-Box" target="_blank" rel="noopener" style="color:var(--text-muted);text-decoration:none">
      <svg viewBox="0 0 16 16" width="16" height="16" fill="var(--text-muted)"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.07 1.87 3.75 3.65 3.95-.29.25-.54.73-.54 1.48 0 1.07.01 1.93.01 2.2 0 .21-.15.46-.55.38A8.013 8.013 0 0 1 0 8c0-4.42 3.58-8 8-8z"/></svg>
      <span>GitHub</span>
    </a>
  </div>

  <!-- 日志 -->
  <section class="page" id="pg-logs">
    <h2 class="pg-title">📋 日志</h2>
    <div class="log-bar">
      <select id="lType">
        <option value="daemon" selected>⚡ 运行日志</option>
        <option value="access">Nginx 访问日志</option>
        <option value="php">PHP 错误日志</option>
        <option value="nginx">Nginx 错误日志</option>
      </select>
      <select id="lLines">
        <option value="50">50 行</option>
        <option value="100" selected>100 行</option>
        <option value="500">500 行</option>
      </select>
      <button class="btn" data-act="logref">🔄 刷新</button>
      <button class="btn" data-act="logauto">▶ 自动</button>
      <button class="btn" data-act="logclear">清屏</button>
    </div>
    <pre class="log-out" id="lOut">加载中…</pre>
  </section>

</div>

<!-- 创建压缩包弹窗 -->
<div id="archiveOverlay" style="display:none;position:fixed;inset:0;z-index:9997;background:rgba(0,0,0,0.4);align-items:center;justify-content:center">
  <div class="glass-dialog" style="border-radius:10px;width:420px;max-width:92%;padding:20px;display:flex;flex-direction:column;gap:14px">
    <div style="font-weight:600;font-size:15px">📦 创建压缩包</div>
    <div><label style="font-size:13px;color:var(--text-muted)">文件名</label><input id="arcName" class="f-input" style="width:100%;margin-top:4px" placeholder="archive.zip"></div>
    <div><label style="font-size:13px;color:var(--text-muted)">格式</label>
      <select id="arcFormat" class="f-input" style="width:100%;margin-top:4px">
        <option value="zip">ZIP</option><option value="7z">7Z</option><option value="tar">TAR</option><option value="tgz">TAR.GZ</option>
      </select>
    </div>
    <div><label style="font-size:13px;color:var(--text-muted)">密码（可选）</label><input id="arcPass" class="f-input" style="width:100%;margin-top:4px" type="password" placeholder="留空无密码"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" id="arcCancelBtn">取消</button>
      <button class="btn btn-primary" id="arcDoBtn">📦 创建</button>
    </div>
  </div>
</div>

<!-- 目录选择弹窗 -->
<div id="dcOverlay" style="display:none;position:fixed;inset:0;z-index:9997;background:rgba(0,0,0,0.4);align-items:center;justify-content:center">
  <div class="glass-dialog" style="border-radius:10px;width:480px;max-width:92%;max-height:70vh;display:flex;flex-direction:column">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border-l)">
      <strong id="dcTitle" style="font-size:15px">📂 选择目标目录</strong>
      <button class="btn btn-sm" id="dcCloseBtn">✕</button>
    </div>
    <div style="padding:10px 18px;border-bottom:1px solid var(--border-l);font-size:14px" id="dcBc">主目录</div>
    <div style="padding:4px 18px;font-size:12px;color:var(--text-muted);border-bottom:1px solid var(--border-l)" id="dcCurTarget">📌 目标: 主目录</div>
    <div id="dcList" style="flex:1;overflow-y:auto;padding:6px 0;min-height:150px;max-height:300px"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;padding:12px 18px;border-top:1px solid var(--border-l)">
      <button class="btn" id="dcCancelBtn">取消</button>
      <button class="btn btn-primary" id="dcConfirmBtn">✓ 粘贴到此</button>
    </div>
  </div>
</div>

<!-- 编辑器弹窗 -->
<div id="edOverlay" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.4);align-items:center;justify-content:center">
  <div class="glass-dialog" id="edDialog" style="border-radius:10px;width:min(80vw,1100px);aspect-ratio:16/9;display:flex;flex-direction:column;position:relative">
    <div id="edTitleBar" style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid #e5e8ec;cursor:move;user-select:none">
      <strong id="edTitle" style="font-size:13px">编辑</strong>
      <button class="btn btn-sm" id="edCloseBtn">✕</button>
    </div>
    <!-- 查找替换栏 -->
    <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:8px 16px;border-bottom:1px solid #e5e8ec">
      <input id="edSearch" placeholder="查找" style="width:140px;padding:4px 8px;border:1px solid #d0d7de;border-radius:4px;font-size:12px;background:var(--glass-nav);color:var(--text);outline:none">
      <input id="edReplace" placeholder="替换为" style="width:140px;padding:4px 8px;border:1px solid #d0d7de;border-radius:4px;font-size:12px;background:var(--glass-nav);color:var(--text);outline:none">
      <label style="display:flex;align-items:center;gap:3px;font-size:12px;cursor:pointer"><input type="checkbox" id="edCase"> 大小写</label>
      <label style="display:flex;align-items:center;gap:3px;font-size:12px;cursor:pointer"><input type="checkbox" id="edWord"> 整词</label>
      <label style="display:flex;align-items:center;gap:3px;font-size:12px;cursor:pointer"><input type="checkbox" id="edRegex"> 正则</label>
      <span id="edMatchInfo" style="font-size:11px;color:var(--text-dim)"></span>
      <button class="btn btn-sm" id="edFindPrev">⬆</button>
      <button class="btn btn-sm" id="edFindNext">⬇</button>
      <button class="btn btn-sm" id="edReplaceOnce" style="background:#f0ad4e;color:#fff">替换</button>
      <button class="btn btn-sm" id="edReplaceAll" style="background:#d9534f;color:#fff">全部替换</button>
    </div>
    <!-- Ace Editor -->
    <div id="aceEditor" style="flex:1;min-height:0;border:none"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-top:1px solid var(--glass-nav-bd)">
      <span id="edInfo" style="font-size:12px;color:var(--text-dim)"></span>
      <div style="display:flex;gap:8px">
        <button class="btn" id="edCancelBtn">取消</button>
        <button class="btn btn-primary" id="edSaveBtn">💾 保存</button>
        <button class="btn btn-primary" id="edSaveCloseBtn">💾 保存并关闭</button>
      </div>
    </div>
    <!-- 右下角缩放手柄 -->
    <div id="edResizeHandle" style="position:absolute;bottom:0;right:0;width:14px;height:14px;cursor:nwse-resize;background:linear-gradient(135deg,transparent 50%,rgba(128,128,128,0.3) 50%);border-radius:0 0 10px 0"></div>
  </div>
</div>

<!-- 新建对话框 -->
<div id="newOverlay" style="display:none;position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,0.4);align-items:center;justify-content:center">
  <div class="glass-dialog" style="border-radius:10px;width:400px;max-width:92%;padding:22px;display:flex;flex-direction:column;gap:14px">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <strong style="font-size:14px">新建</strong>
      <button class="btn btn-sm" id="newCloseBtn">✕</button>
    </div>
    <div style="display:flex;gap:14px">
      <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px"><input type="radio" name="newType" id="newTypeFile" checked> 📄 文件</label>
      <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px"><input type="radio" name="newType" id="newTypeDir"> 📁 文件夹</label>
    </div>
    <input id="newName" style="padding:7px 11px;border:1px solid #d0d7de;border-radius:6px;font-size:14px" placeholder="输入名称...">
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" id="newCancelBtn">取消</button>
      <button class="btn btn-primary" id="newCreateBtn">✓ 创建</button>
    </div>
  </div>
</div>

$
$


<!-- 设置弹窗 -->
<div id="setOverlay" style="display:none;position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,0.4);align-items:center;justify-content:center">
  <div class="glass-dialog" style="border-radius:10px;width:400px;max-width:92%;padding:24px;display:flex;flex-direction:column;gap:14px">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <strong style="font-size:15px">⚙️ 修改账号密码</strong>
      <button class="btn btn-sm" id="setCloseBtn">✕</button>
    </div>
    <div class="login-field">
      <input id="setOldUser" class="f-input" placeholder="原用户名" style="text-align:center" spellcheck="false">
    </div>
    <div class="login-field">
      <input id="setOldPass" type="password" class="f-input" placeholder="原密码" style="text-align:center" spellcheck="false">
    </div>
    <div style="border-top:1px solid var(--border-l);margin:4px 0"></div>
    <div class="login-field">
      <input id="setNewUser" class="f-input" placeholder="新用户名" style="text-align:center" spellcheck="false">
    </div>
    <div class="login-field">
      <input id="setNewPass" type="password" class="f-input" placeholder="新密码" style="text-align:center" spellcheck="false">
    </div>
    <div id="setErr" style="font-size:13px;color:var(--red);min-height:0;text-align:center;opacity:0;transition:opacity .2s"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" id="setCancelBtn">取消</button>
      <button class="btn btn-primary" id="setSaveBtn">💾 保存</button>
    </div>
  </div>
</div>

<div class="toast-wrap" id="tt"></div>

<script src="vendor/ace/ace.js"></script>
<script>
ace.config.set('basePath', '/vendor/ace/');
</script>
<script src="app.js?v=2"></script>


</body>
</html>
